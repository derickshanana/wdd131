<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sun -->
  <circle cx="35" cy="35" r="15" fill="#FFD34D" />

  <!-- Sun rays -->
  <g stroke="#FFD34D" stroke-width="3">
    <line x1="35" y1="5" x2="35" y2="15"/>
    <line x1="35" y1="55" x2="35" y2="65"/>
    <line x1="5" y1="35" x2="15" y2="35"/>
    <line x1="55" y1="35" x2="65" y2="35"/>
    <line x1="15" y1="15" x2="22" y2="22"/>
    <line x1="48" y1="48" x2="55" y2="55"/>
    <line x1="15" y1="55" x2="22" y2="48"/>
    <line x1="48" y1="22" x2="55" y2="15"/>
  </g>

  <!-- Cloud -->
  <ellipse cx="60" cy="60" rx="20" ry="12" fill="#D3D3D3" />
  <ellipse cx="45" cy="60" rx="15" ry="10" fill="#D3D3D3" />
  <ellipse cx="52" cy="50" rx="12" ry="10" fill="#D3D3D3" />
